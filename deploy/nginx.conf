server {
    listen 80;
    server_name _;

    location /tarot-privacy/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /tarot-privacy/index.html;
    }

    location /tarot-privacy/health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
